<!DOCTYPE html><html><head><title>Icon Generator</title></head><body style="background:#1a1a2e;color:#e8e8f0;font-family:sans-serif;padding:20px"><h2>Icon Generator</h2><p>Click derecho en cada icono -> Guardar como PNG en <code>icons/</code></p><div id="icons" style="display:flex;gap:40px;margin-top:20px"></div><script>function generateIcon(size){const c=document.createElement("canvas");c.width=size;c.height=size;c.style.border="1px solid #333";c.style.borderRadius="8px";const ctx=c.getContext("2d");const g=ctx.createLinearGradient(0,0,size,size);g.addColorStop(0,"#f5a623");g.addColorStop(1,"#ff6b35");ctx.fillStyle=g;ctx.beginPath();ctx.rect(size*0.1,size*0.1,size*0.8,size*0.8);ctx.fill();ctx.fillStyle="#fff";ctx.font="bold "+(size*0.5)+"px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("$",size*0.5,size*0.42);ctx.strokeStyle="#fff";ctx.lineWidth=Math.max(size*0.06,2);ctx.beginPath();ctx.moveTo(size*0.45,size*0.6);ctx.lineTo(size*0.7,size*0.85);ctx.stroke();ctx.beginPath();ctx.moveTo(size*0.7,size*0.55);ctx.lineTo(size*0.7,size*0.85);ctx.lineTo(size*0.45,size*0.85);ctx.stroke();return c}const container=document.getElementById("icons");[16,48,128].forEach(size=>{const div=document.createElement("div");div.style.textAlign="center";const canvas=generateIcon(size);div.appendChild(canvas);const label=document.createElement("p");label.textContent=size+"x"+size+" -> icon"+size+".png";label.style.fontSize="12px";label.style.color="#a0a0b8";div.appendChild(label);const link=document.createElement("a");link.href=canvas.toDataURL("image/png");link.download="icon"+size+".png";link.textContent="Descargar";link.style.display="block";link.style.color="#f5a623";link.style.fontSize="13px";link.style.marginTop="8px";div.appendChild(link);container.appendChild(div)})</script></body></html>
